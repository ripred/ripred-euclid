  <text x="150" y="424" fill="#93c5fd" font-family="Arial, Helvetica, sans-serif" font-size="24">168–25 • Bounding Rectangle scoring • 8×8 board</text>

  <rect x="110" y="480" width="430" height="160" rx="26" fill="#31181e" stroke="#7f1d1d"/>
